<div class="login-page">
  <div class="background-animation">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
  </div>

  <div class="login-wrapper">
    <div class="glass-card login-card">
      <div class="login-header">
        <div class="logo-icon">S</div>
        <h2>SecureWorks</h2>
        <p>Enterprise Access Control System</p>
      </div>

      <form (ngSubmit)="login()">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-container">
            <span class="input-icon">👤</span>
            <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Enter your username" required />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-container">
            <span class="input-icon">🔒</span>
            <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required />
          </div>
        </div>

        <button type="submit" class="btn-primary login-btn">
          Sign In
        </button>


      </form>
    </div>
  </div>
</div>
